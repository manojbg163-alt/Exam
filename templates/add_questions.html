<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Questions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Add Questions to {{ exam.title }}</h1>
    <form method="POST">
        <label>Question:</label>
        <textarea name="question_text" required></textarea><br>
        <label>Option 1:</label>
        <input type="text" name="option1" required><br>
        <label>Option 2:</label>
        <input type="text" name="option2" required><br>
        <label>Option 3:</label>
        <input type="text" name="option3" required><br>
        <label>Option 4:</label>
        <input type="text" name="option4" required><br>
        <label>Correct Answer (1-4):</label>
        <input type="text" name="correct_answer" required><br>
        <button type="submit">Add Question</button>
    </form>
    <a href="{{ url_for('dashboard') }}">Back</a>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
</body>
</html>
