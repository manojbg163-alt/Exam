<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Take Exam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ exam.title }}</h1>
    <form method="POST">
        {% for question in questions %}
            <div>
                <p>{{ question.question_text }}</p>
                {% set options = question.options | fromjson %}
                {% for i in range(4) %}
                    <input type="radio" name="question_{{ question.id }}" value="{{ i+1 }}" required> {{ options[i] }}<br>
                {% endfor %}
            </div>
        {% endfor %}
        <button type="submit">Submit Exam</button>
    </form>
    <a href="{{ url_for('dashboard') }}">Back</a>
</body>
</html>
